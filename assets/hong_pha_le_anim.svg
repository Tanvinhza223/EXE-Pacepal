<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<style>
.hpA-glow{animation:hpA-pulse 3.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes hpA-pulse{0%,100%{opacity:.65;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
.hpA-sp{animation:hpA-tw 2.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.hpA-sp2{animation-delay:.8s}.hpA-sp3{animation-delay:1.5s}
@keyframes hpA-tw{0%,100%{opacity:.15;transform:scale(.6)}50%{opacity:1;transform:scale(1.2)}}

.hpA-burst{animation:hpA-bp 4.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes hpA-bp{0%,100%{opacity:.5;transform:scale(.92)}50%{opacity:1;transform:scale(1.1)}}
.hpA-rays{animation:hpA-rp 4.2s ease-in-out infinite}
@keyframes hpA-rp{0%,100%{opacity:.3}50%{opacity:.85}}
.hpA-dot{animation:hpA-float 6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.hpA-dot2{animation-delay:1.5s}.hpA-dot3{animation-delay:3s}.hpA-dot4{animation-delay:4.5s}
@keyframes hpA-float{0%{transform:translateY(0);opacity:.3}40%{opacity:.95}100%{transform:translateY(-16px);opacity:0}}
</style>
<defs>
<radialGradient id="hp_g"><stop offset="0%" stop-color="#FF9EC4" stop-opacity="0.4"/><stop offset="60%" stop-color="#FF7BB0" stop-opacity="0.18"/><stop offset="100%" stop-color="#FF7BB0" stop-opacity="0"/></radialGradient>
<radialGradient id="hp_burst"><stop offset="0%" stop-color="#FFD3E5" stop-opacity="0.7"/><stop offset="100%" stop-color="#FF9EC4" stop-opacity="0"/></radialGradient>
<linearGradient id="hp_leaf" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#F27BAE" stop-opacity="0.55"/><stop offset="100%" stop-color="#FFD3E5" stop-opacity="0.8"/></linearGradient>
</defs>
<ellipse cx="100" cy="172" rx="54" ry="11" fill="#7A9978" opacity="0.7"/>
<ellipse cx="100" cy="169" rx="50" ry="9" fill="#8FB28A" opacity="0.7"/>
<ellipse class="hpA-glow" cx="100" cy="96" rx="62" ry="58" fill="url(#hp_g)"/>
<!-- chùm sáng gốc -->
<ellipse class="hpA-burst" cx="100" cy="152" rx="30" ry="16" fill="url(#hp_burst)"/>
<path class="hpA-rays" d="M100 152 L82 166 M100 152 L100 170 M100 152 L118 166 M100 152 L74 156 M100 152 L126 156" stroke="#FFC2DC" stroke-width="1.4" opacity="0.7"/>
<!-- thân -->
<path d="M100 160 C99 140 99 120 100 76" stroke="#E06A9C" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.9"/>
<path d="M100 160 C99 140 99 120 100 76" stroke="#FFD3E5" stroke-width="1.4" fill="none" stroke-linecap="round"/>
<!-- lá pha lê (đa giác trong mờ viền sáng) -->
<path d="M99 128 L74 118 L60 124 L72 134 L96 132 Z" fill="url(#hp_leaf)" stroke="#FFD3E5" stroke-width="1.4"/>
<path d="M96 130 L64 124" stroke="#FFC2DC" stroke-width="1" opacity="0.8"/>
<path d="M101 128 L126 116 L142 122 L130 134 L104 132 Z" fill="url(#hp_leaf)" stroke="#FFD3E5" stroke-width="1.4"/>
<path d="M104 130 L138 123" stroke="#FFC2DC" stroke-width="1" opacity="0.8"/>
<path d="M99 144 L78 144 L68 152 L82 156 L98 150 Z" fill="url(#hp_leaf)" stroke="#FFD3E5" stroke-width="1.2" opacity="0.95"/>
<path d="M101 144 L122 142 L134 150 L120 155 L102 150 Z" fill="url(#hp_leaf)" stroke="#FFD3E5" stroke-width="1.2" opacity="0.95"/>
<path d="M100 112 L88 100 L88 88 L99 98 Z" fill="url(#hp_leaf)" stroke="#FFD3E5" stroke-width="1.2" opacity="0.9"/>
<path d="M100 112 L114 98 L114 86 L101 98 Z" fill="url(#hp_leaf)" stroke="#FFD3E5" stroke-width="1.2" opacity="0.9"/>
<!-- bông hồng -->
<g transform="translate(100 58)">
<circle r="22" fill="#FF9EC4" opacity="0.25"/>
<path d="M-16 6 C-21 -6 -15 -17 -4 -19 C-11 -11 -13 -2 -11 8 C-13 9 -15 8 -16 6 Z" fill="#FFC2DC" opacity="0.95"/>
<path d="M16 6 C21 -6 15 -17 4 -19 C11 -11 13 -2 11 8 C13 9 15 8 16 6 Z" fill="#FFB0D2" opacity="0.95"/>
<path d="M-11 8 C-13 -5 -6 -15 0 -17 C6 -15 13 -5 11 8 C5 13 -5 13 -11 8 Z" fill="#F893BE" opacity="0.95"/>
<path d="M-6 -4 C-5 -10 -2 -14 0 -15 C-1 -8 -1.5 -1 -1.5 7" stroke="#FFE3EF" stroke-width="1.4" fill="none" opacity="0.9"/>
<path d="M6 -4 C5 -10 2 -14 0 -15 C1 -8 1.5 -1 1.5 7" stroke="#FFE3EF" stroke-width="1.4" fill="none" opacity="0.9"/>
<path d="M-5 -17 C-3 -21 3 -21 5 -17" stroke="#FFD3E5" stroke-width="1.6" fill="none"/>
<path d="M-10 9 C-4 13 4 13 10 9" fill="none" stroke="#F47FB2" stroke-width="2" opacity="0.85"/>
<path d="M-3 -8 C-1 -12 2 -13 4 -12" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.8"/>
<path d="M0 12 L-7 20 M0 12 L7 20 M0 12 L0 22" stroke="#E06A9C" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
</g>
<!-- sparkle -->
<path class="hpA-sp" d="M66 78 l1.8 4 4 1.8 -4 1.8 -1.8 4 -1.8 -4 -4 -1.8 4 -1.8 Z" fill="#FFE3EF"/>
<path class="hpA-sp hpA-sp2" d="M138 72 l1.5 3.4 3.4 1.5 -3.4 1.5 -1.5 3.4 -1.5 -3.4 -3.4 -1.5 3.4 -1.5 Z" fill="#FFD3E5"/>
<path class="hpA-sp hpA-sp3" d="M126 148 l1.4 3.2 3.2 1.4 -3.2 1.4 -1.4 3.2 -1.4 -3.2 -3.2 -1.4 3.2 -1.4 Z" fill="#FFC2DC"/>
<circle class="hpA-dot" cx="58" cy="120" r="1.6" fill="#FFD3E5" opacity="0.9"/>
<circle class="hpA-dot hpA-dot2" cx="146" cy="104" r="1.5" fill="#FFC2DC" opacity="0.85"/>
<circle class="hpA-dot hpA-dot3" cx="80" cy="42" r="1.4" fill="#FFE3EF" opacity="0.85"/>
<circle class="hpA-dot hpA-dot4" cx="124" cy="38" r="1.3" fill="#FFD3E5" opacity="0.8"/>
</svg>
