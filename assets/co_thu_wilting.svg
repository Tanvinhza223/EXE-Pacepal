<path d="M134 171 q2 -5 5 -6 q0 5 -2 7 Z" fill="#6FB75A"/>
<path d="M64 169 q1 -6 3 -8 q1 5 0 8 Z" fill="#5FA34A"/>
</g>
<ellipse class="ctW-leaf" cx="80" cy="72" rx="4.2" ry="2.3" fill="#9CA05A"/><ellipse class="ctW-leaf ctW-l2" cx="112" cy="56" rx="4" ry="2.2" fill="#8E9A50"/><ellipse class="ctW-leaf ctW-l3" cx="132" cy="88" rx="3.8" ry="2.1" fill="#B08A52"/><ellipse class="ctW-leaf ctW-l4" cx="94" cy="60" rx="3.6" ry="2" fill="#9CA05A"/>
</svg>
