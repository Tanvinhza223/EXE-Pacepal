<circle cx="131" cy="100" r="2.5" fill="#66B04B"/><circle cx="132" cy="118" r="2.2" fill="#66B04B"/>
<path d="M112 128 C118 132 120 140 116 146 C112 142 110 134 112 128 Z" fill="#5B9E3E"/>
<!-- đá + cỏ -->
<ellipse cx="74" cy="170" rx="6" ry="3.5" fill="#9A9A8E"/>
