<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<style>
.ctW-plant{animation:ctW-wilt 10s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 100%}
@keyframes ctW-wilt{
 0%{transform:rotate(0);filter:none}
 2%{transform:rotate(-1.4deg)}
 4%{transform:rotate(1.4deg)}
 6%{transform:rotate(-1deg)}
 8%{transform:rotate(.8deg);filter:none}
 78%{transform:rotate(3.2deg);filter:grayscale(.75) brightness(.85)}
 92%{transform:rotate(3.2deg);filter:grayscale(.78) brightness(.84)}
 100%{transform:rotate(0);filter:none}}
.ctW-leaf{animation:ctW-fall 5.5s ease-in infinite;transform-box:fill-box;transform-origin:center;opacity:0}
.ctW-l2{animation-delay:1.4s}.ctW-l3{animation-delay:2.8s}.ctW-l4{animation-delay:4s}
@keyframes ctW-fall{
 0%{transform:translate(0,0) rotate(0);opacity:0}
 6%{opacity:1}
 45%{transform:translate(-12px,42px) rotate(-100deg);opacity:1}
 75%{transform:translate(2px,66px) rotate(-150deg);opacity:.9}
 100%{transform:translate(9px,90px) rotate(-210deg);opacity:0}}
.ctW-gl{animation:ctW-gf 10s ease-in-out infinite}
@keyframes ctW-gf{0%,8%{opacity:1}78%,92%{opacity:.22}100%{opacity:1}}
</style>
<defs>
<linearGradient id="ct_tr" x1="0" y1="0" x2="1" y2="0">
<stop offset="0%" stop-color="#8A5A35"/><stop offset="45%" stop-color="#A8714A"/><stop offset="100%" stop-color="#6E4527"/>
</linearGradient>
<radialGradient id="ct_gr"><stop offset="0%" stop-color="#86C45D"/><stop offset="100%" stop-color="#5B9E3E"/></radialGradient>
</defs>
<ellipse cx="100" cy="174" rx="58" ry="12" fill="#79B364"/>
<ellipse cx="100" cy="171" rx="54" ry="10" fill="#94CE7A"/>
<g class="ctW-plant">
<!-- rễ nổi -->
