<path d="M110 104 C124 96 138 94 150 98" stroke="#6E4527" stroke-width="8" fill="none" stroke-linecap="round"/>
<!-- tán lá 3 tầng, nhiều mảng -->
<circle cx="58" cy="84" r="20" fill="#3E7A2E"/>
<circle cx="142" cy="86" r="20" fill="#3E7A2E"/>
<circle cx="100" cy="56" r="30" fill="#3E7A2E"/>
<circle cx="76" cy="68" r="22" fill="#3E7A2E"/>
<circle cx="124" cy="68" r="22" fill="#3E7A2E"/>
