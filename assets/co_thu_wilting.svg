<path d="M122 170 C126 162 124 154 116 150 L108 156 C114 160 118 165 118 170 Z" fill="#6E4527"/>
<path d="M66 172 C60 168 58 162 62 158 L72 164 C68 166 66 169 66 172 Z" fill="#8A5A35"/>
<path d="M134 172 C140 168 142 162 138 158 L128 164 C132 166 134 169 134 172 Z" fill="#6E4527"/>
<!-- thân xoắn -->
<path d="M82 170 C84 140 80 118 88 100 L112 100 C120 120 116 142 118 170 Z" fill="url(#ct_tr)"/>
