<circle cx="140" cy="82" r="16" fill="url(#ct_gr)"/>
<circle cx="78" cy="64" r="18" fill="url(#ct_gr)"/>
<circle cx="122" cy="64" r="18" fill="url(#ct_gr)"/>
<circle cx="100" cy="52" r="26" fill="url(#ct_gr)"/>
<circle cx="92" cy="42" r="12" fill="#A2D87E"/>
<circle cx="70" cy="58" r="8" fill="#A2D87E" opacity="0.9"/>
<circle cx="118" cy="56" r="7" fill="#A2D87E" opacity="0.85"/>
<circle cx="135" cy="76" r="6" fill="#A2D87E" opacity="0.8"/>
<!-- gân lá nhỏ -->
<path d="M88 44 q4 -4 9 -4 M64 60 q4 -3 8 -3 M114 58 q4 -3 8 -3" stroke="#CDEBAB" stroke-width="1.5" fill="none" stroke-linecap="round"/>
