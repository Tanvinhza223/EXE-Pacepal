<path d="M92 165 C90 145 92 125 96 108" stroke="#5E3A1F" stroke-width="2" fill="none" opacity="0.55"/>
<path d="M104 166 C106 146 104 128 102 110" stroke="#5E3A1F" stroke-width="1.6" fill="none" opacity="0.45"/>
<path d="M98 160 C97 150 98 138 100 126" stroke="#C28B5C" stroke-width="1.6" fill="none" opacity="0.6"/>
<!-- hốc cây -->
<ellipse cx="97" cy="138" rx="6" ry="9" fill="#4A2D16"/>
<ellipse cx="97" cy="136" rx="4.5" ry="7" fill="#2E1B0C"/>
