  <path d="M190 118 C188 100 194 90 202 90 C210 90 216 100 214 118 Z" fill="#e0a04a"/>
  <path d="M194 96 C198 92 206 92 210 96 L210 104 C206 101 198 101 194 104 Z" fill="#f4c66b"/>
  <!-- arms holding book -->
  <path d="M193 106 C188 110 186 116 188 122" stroke="#e0a04a" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M211 106 C216 110 218 116 216 122" stroke="#e0a04a" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- head -->
  <circle cx="202" cy="76" r="13" fill="#d99a6c"/>
  <path d="M189 76 C187 62 196 55 204 56 C213 57 216 66 214 76 C212 70 209 66 204 66 L204 60 C197 61 191 67 190 76 Z" fill="#4a3526"/>
  <circle cx="199" cy="77" r="1.6" fill="#3a2a1e"/><circle cx="207" cy="77" r="1.6" fill="#3a2a1e"/>
