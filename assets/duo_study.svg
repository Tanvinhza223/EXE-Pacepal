<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160">
<defs>
<radialGradient id="duo_sh"><stop offset="0%" stop-color="#000" stop-opacity="0.32"/><stop offset="100%" stop-color="#000" stop-opacity="0"/></radialGradient>
