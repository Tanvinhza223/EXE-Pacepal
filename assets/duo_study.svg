  <circle cx="75" cy="77" r="1.6" fill="#3a2a1e"/><circle cx="83" cy="77" r="1.6" fill="#3a2a1e"/>
  <path d="M76 82 q3 2.5 6 0" stroke="#b9774f" stroke-width="1.4" fill="none" stroke-linecap="round"/>
