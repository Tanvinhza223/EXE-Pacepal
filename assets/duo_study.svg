    <rect x="92" y="118" width="30" height="20" rx="2.5" fill="#2e3b33"/>
    <rect x="95" y="121" width="24" height="14" rx="1.5" fill="url(#duo_lap)"/>
    <rect x="88" y="136" width="38" height="5" rx="2.5" fill="#42514a"/>
  </g>
</g>

<!-- ░ small shared sprout between them ░ -->
<path d="M140 140 L140 128" stroke="#5b9e3e" stroke-width="2.2" fill="none" stroke-linecap="round"/>
<path d="M140 132 C134 131 131 127 132 122 C138 123 141 127 140 132 Z" fill="#7fc66a"/>
<path d="M140 130 C146 129 149 125 148 120 C142 121 139 125 140 130 Z" fill="#94ce7a"/>

<!-- ░ Person B (right) — amber top, with book ░ -->
<g>
  <!-- crossed legs -->
  <path d="M182 138 C180 124 188 116 202 116 C216 116 224 124 222 138 Z" fill="#7a5230"/>
  <path d="M184 134 q18 7 36 0" stroke="#5f3f24" stroke-width="2" fill="none" opacity="0.6"/>
