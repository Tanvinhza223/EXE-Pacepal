<path d="M116 84 C128 76 134 62 130 46" stroke="#FFD9C2" stroke-width="1.1" fill="none" opacity="0.85"/>
<path d="M92 40 C94 32 100 26 108 26" stroke="#FFD9C2" stroke-width="1" fill="none" opacity="0.75"/>
