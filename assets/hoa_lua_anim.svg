<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<style>
.hlA-glow{animation:hlA-pulse 3.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes hlA-pulse{0%,100%{opacity:.65;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
.hlA-sp{animation:hlA-tw 2.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.hlA-sp2{animation-delay:.8s}.hlA-sp3{animation-delay:1.5s}
@keyframes hlA-tw{0%,100%{opacity:.15;transform:scale(.6)}50%{opacity:1;transform:scale(1.2)}}

.hlA-glow{animation-duration:2.8s}
.hlA-core{animation:hlA-fl 1.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center bottom}
@keyframes hlA-fl{0%,100%{opacity:.9;transform:scaleY(1)}30%{opacity:1;transform:scaleY(1.1)}60%{opacity:.85;transform:scaleY(.95)}}
.hlA-em{animation:hlA-rise 3.6s ease-out infinite}
.hlA-em2{animation-delay:.9s}.hlA-em3{animation-delay:1.8s}.hlA-em4{animation-delay:2.6s}
@keyframes hlA-rise{0%{transform:translateY(6px);opacity:0}25%{opacity:1}100%{transform:translateY(-26px);opacity:0}}
.hlA-fp{animation:hlA-fpk 4.5s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes hlA-fpk{0%,100%{opacity:.5;transform:scale(.9)}50%{opacity:1;transform:scale(1.12)}}
</style>
<defs>
<radialGradient id="hl_g"><stop offset="0%" stop-color="#FF5E5E" stop-opacity="0.4"/><stop offset="60%" stop-color="#E83A3A" stop-opacity="0.16"/><stop offset="100%" stop-color="#E83A3A" stop-opacity="0"/></radialGradient>
<radialGradient id="hl_core"><stop offset="0%" stop-color="#FFF3C4"/><stop offset="60%" stop-color="#FFB347"/><stop offset="100%" stop-color="#F2545B"/></radialGradient>
<linearGradient id="hl_pet" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#A61B2E"/><stop offset="55%" stop-color="#E8323E"/><stop offset="100%" stop-color="#FF7E6B"/></linearGradient>
<linearGradient id="hl_stem" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#7A1626"/><stop offset="50%" stop-color="#B3273A"/><stop offset="100%" stop-color="#5E0F1C"/></linearGradient>
</defs>
<ellipse cx="100" cy="172" rx="52" ry="11" fill="#8C6A5E" opacity="0.7"/>
<ellipse cx="100" cy="169" rx="48" ry="9" fill="#A3837A" opacity="0.7"/>
