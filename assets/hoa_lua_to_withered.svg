 6%{transform:rotate(-1.2deg)}
 10%{transform:rotate(1.2deg)}
 14%{transform:rotate(-.8deg)}
 30%{filter:grayscale(.35) brightness(.96);opacity:1}
 62%{filter:grayscale(.7) brightness(.9);opacity:.5;transform:rotate(2.6deg)}
 88%,100%{opacity:0;filter:grayscale(.85) brightness(.85);transform:rotate(3.2deg)}}
.hoT-w{opacity:0;animation:hoT-in 8s ease-in-out forwards}
@keyframes hoT-in{0%,32%{opacity:0}55%{opacity:.45}82%,100%{opacity:1}}
</style>
