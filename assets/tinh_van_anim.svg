<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<style>
.tvA-glow{animation:tvA-pulse 3.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes tvA-pulse{0%,100%{opacity:.65;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
.tvA-sp{animation:tvA-tw 2.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.tvA-sp2{animation-delay:.8s}.tvA-sp3{animation-delay:1.5s}
@keyframes tvA-tw{0%,100%{opacity:.15;transform:scale(.6)}50%{opacity:1;transform:scale(1.2)}}

.tvA-orb{animation:tvA-op 3s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
@keyframes tvA-op{0%,100%{opacity:.6;transform:scale(.94)}50%{opacity:1;transform:scale(1.12)}}
.tvA-dot{animation:tvA-drift 5.5s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.tvA-dot2{animation-delay:1.4s}.tvA-dot3{animation-delay:2.8s}.tvA-dot4{animation-delay:4s}
@keyframes tvA-drift{0%{transform:translateY(4px);opacity:0}35%{opacity:.95}100%{transform:translateY(-18px);opacity:0}}
</style>
<defs>
<radialGradient id="tv_g"><stop offset="0%" stop-color="#C77BFF" stop-opacity="0.38"/><stop offset="60%" stop-color="#A04BD8" stop-opacity="0.16"/><stop offset="100%" stop-color="#A04BD8" stop-opacity="0"/></radialGradient>
<linearGradient id="tv_rib" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#8E2D9E"/><stop offset="50%" stop-color="#D9479E"/><stop offset="100%" stop-color="#FF8AC2"/></linearGradient>
<radialGradient id="tv_orb" cx="42%" cy="35%"><stop offset="0%" stop-color="#FFF3C4"/><stop offset="55%" stop-color="#FFC23F"/><stop offset="100%" stop-color="#D97B1E"/></radialGradient>
<radialGradient id="tv_og"><stop offset="0%" stop-color="#FFD166" stop-opacity="0.5"/><stop offset="100%" stop-color="#FFD166" stop-opacity="0"/></radialGradient>
</defs>
<ellipse cx="100" cy="172" rx="52" ry="11" fill="#6E5E86" opacity="0.7"/>
<ellipse cx="100" cy="169" rx="48" ry="9" fill="#857399" opacity="0.7"/>
<ellipse class="tvA-glow" cx="100" cy="90" rx="64" ry="58" fill="url(#tv_g)"/>
<!-- dải lụa cánh toả -->
<path d="M100 96 C90 80 92 58 106 40 C96 60 98 80 104 94 Z" fill="url(#tv_rib)"/>
<path d="M100 96 C110 78 108 56 94 38 C104 58 102 80 96 94 Z" fill="url(#tv_rib)" opacity="0.9"/>
<path d="M100 98 C84 88 74 70 76 48 C82 70 90 86 102 96 Z" fill="url(#tv_rib)"/>
<path d="M100 98 C116 88 126 70 124 48 C118 70 110 86 98 96 Z" fill="url(#tv_rib)"/>
<path d="M100 100 C80 96 64 84 56 66 C68 82 84 92 102 98 Z" fill="url(#tv_rib)" opacity="0.95"/>
<path d="M100 100 C120 96 136 84 144 66 C132 82 116 92 98 98 Z" fill="url(#tv_rib)" opacity="0.95"/>
<path d="M98 102 C78 104 60 100 48 88 C62 100 80 104 100 104 Z" fill="url(#tv_rib)" opacity="0.85"/>
<path d="M102 102 C122 104 140 100 152 88 C138 100 120 104 100 104 Z" fill="url(#tv_rib)" opacity="0.85"/>
<!-- viền sáng trên dải -->
<path d="M78 52 C84 72 92 86 100 94" stroke="#FFB0D8" stroke-width="1" fill="none" opacity="0.8"/>
<path d="M122 52 C116 72 108 86 100 94" stroke="#FFB0D8" stroke-width="1" fill="none" opacity="0.8"/>
<path d="M58 70 C70 84 86 94 100 98" stroke="#FFB0D8" stroke-width="0.9" fill="none" opacity="0.7"/>
<path d="M142 70 C130 84 114 94 100 98" stroke="#FFB0D8" stroke-width="0.9" fill="none" opacity="0.7"/>
<!-- quả cầu vàng xếp tầng -->
<circle class="tvA-orb" cx="100" cy="118" r="22" fill="url(#tv_og)"/>
<ellipse cx="100" cy="112" rx="13" ry="14" fill="url(#tv_orb)"/>
<path d="M93 104 C97 110 96 116 92 120 M100 102 C103 109 103 116 100 122 M107 105 C109 111 108 117 105 120" stroke="#A8531E" stroke-width="1.3" fill="none" opacity="0.75"/>
<ellipse cx="100" cy="136" rx="11" ry="12" fill="url(#tv_orb)"/>
<path d="M94 129 C97 134 97 139 94 143 M101 127 C104 133 104 140 101 145 M106 130 C108 135 107 140 105 143" stroke="#A8531E" stroke-width="1.2" fill="none" opacity="0.75"/>
