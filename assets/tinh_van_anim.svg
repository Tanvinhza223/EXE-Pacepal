<path d="M93 146 C92 154 94 160 97 164 L103 164 C106 158 107 152 107 146 Z" fill="#6E2D7E"/>
<path d="M99 164 C99 167 99 169 99 171 L101 171 C101 168 101 166 101 164 Z" fill="#54215E"/>
<!-- sparkle -->
<path class="tvA-sp" d="M62 56 l1.8 4 4 1.8 -4 1.8 -1.8 4 -1.8 -4 -4 -1.8 4 -1.8 Z" fill="#F2C9FF" opacity="0.95"/>
<path class="tvA-sp tvA-sp2" d="M140 50 l1.5 3.4 3.4 1.5 -3.4 1.5 -1.5 3.4 -1.5 -3.4 -3.4 -1.5 3.4 -1.5 Z" fill="#FFD3EC" opacity="0.9"/>
<path class="tvA-sp tvA-sp3" d="M148 110 l1.4 3.2 3.2 1.4 -3.2 1.4 -1.4 3.2 -1.4 -3.2 -3.2 -1.4 3.2 -1.4 Z" fill="#F2C9FF" opacity="0.85"/>
<circle class="tvA-dot" cx="54" cy="100" r="1.6" fill="#F2C9FF" opacity="0.9"/>
<circle class="tvA-dot tvA-dot2" cx="86" cy="32" r="1.4" fill="#FFD3EC" opacity="0.85"/>
<circle class="tvA-dot tvA-dot3" cx="118" cy="28" r="1.3" fill="#F2C9FF" opacity="0.8"/>
<circle class="tvA-dot tvA-dot4" cx="146" cy="132" r="1.4" fill="#FFB0D8" opacity="0.8"/>
<circle class="tvA-dot tvA-dot2" cx="60" cy="134" r="1.3" fill="#F2C9FF" opacity="0.8"/>
</svg>
