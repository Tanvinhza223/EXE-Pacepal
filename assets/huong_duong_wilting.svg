<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
<style>
.hdW-plant{animation:hdW-wilt 10s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 100%}
@keyframes hdW-wilt{
 0%{transform:rotate(0);filter:none}
 2%{transform:rotate(-1.4deg)}
 4%{transform:rotate(1.4deg)}
 6%{transform:rotate(-1deg)}
 8%{transform:rotate(.8deg);filter:none}
 78%{transform:rotate(3.2deg);filter:grayscale(.75) brightness(.85)}
 92%{transform:rotate(3.2deg);filter:grayscale(.78) brightness(.84)}
 100%{transform:rotate(0);filter:none}}
.hdW-leaf{animation:hdW-fall 5.5s ease-in infinite;transform-box:fill-box;transform-origin:center;opacity:0}
.hdW-l2{animation-delay:1.4s}.hdW-l3{animation-delay:2.8s}.hdW-l4{animation-delay:4s}
@keyframes hdW-fall{
 0%{transform:translate(0,0) rotate(0);opacity:0}
 6%{opacity:1}
 45%{transform:translate(-12px,42px) rotate(-100deg);opacity:1}
 75%{transform:translate(2px,66px) rotate(-150deg);opacity:.9}
 100%{transform:translate(9px,90px) rotate(-210deg);opacity:0}}
.hdW-gl{animation:hdW-gf 10s ease-in-out infinite}
@keyframes hdW-gf{0%,8%{opacity:1}78%,92%{opacity:.22}100%{opacity:1}}
</style>
<defs>
<linearGradient id="hd_p" x1="0" y1="1" x2="0" y2="0">
<stop offset="0%" stop-color="#E8960C"/><stop offset="100%" stop-color="#FFD23F"/>
</linearGradient>
<radialGradient id="hd_c"><stop offset="0%" stop-color="#7A4A1E"/><stop offset="80%" stop-color="#5C3414"/><stop offset="100%" stop-color="#46260C"/></radialGradient>
