<g class="hoT-h">
<defs>
<radialGradient id="hp_g"><stop offset="0%" stop-color="#FF9EC4" stop-opacity="0.4"/><stop offset="60%" stop-color="#FF7BB0" stop-opacity="0.18"/><stop offset="100%" stop-color="#FF7BB0" stop-opacity="0"/></radialGradient>
<radialGradient id="hp_burst"><stop offset="0%" stop-color="#FFD3E5" stop-opacity="0.7"/><stop offset="100%" stop-color="#FF9EC4" stop-opacity="0"/></radialGradient>
<linearGradient id="hp_leaf" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#F27BAE" stop-opacity="0.55"/><stop offset="100%" stop-color="#FFD3E5" stop-opacity="0.8"/></linearGradient>
</defs>
